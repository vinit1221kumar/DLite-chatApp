services:
  turn:
    image: coturn/coturn:4.6
    working_dir: /tmp
    command:
      - -n
      - --min-port=49160
      - --max-port=49200
      - --realm=${TURN_REALM:-dlite}
      - --user=${TURN_USER:-dlite}:${TURN_PASSWORD:-dlite}
      - --lt-cred-mech
      - --fingerprint
      - --no-multicast-peers
      - --no-cli
      - --no-tls
      - --no-dtls
      - --pidfile=/tmp/turnserver.pid
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    restart: unless-stopped
    networks:
      - public
    healthcheck:
      test: ["CMD", "sh", "-lc", "turnserver -V >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  api-gateway:
    build:
      context: ./D-Lite-api-gateway
    env_file: ./D-Lite-api-gateway/.env
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-4000}
      AUTH_SERVICE_URL: http://auth-service:${AUTH_PORT:-4001}
      CHAT_SERVICE_URL: http://chat-service:${CHAT_PORT:-4002}
      CALL_SERVICE_URL: http://call-service:${CALL_PORT:-4003}
      MEDIA_SERVICE_URL: http://media-service:${MEDIA_PORT:-4004}
      GATEWAY_CORS_ORIGIN: ${GATEWAY_CORS_ORIGIN:-*}
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    depends_on:
      auth-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      call-service:
        condition: service_healthy
      media-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - public
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  auth-service:
    build:
      context: ./D-Lite-auth-service
    env_file: ./D-Lite-auth-service/.env
    environment:
      PORT: ${AUTH_PORT:-4001}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4001/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  chat-service:
    build:
      context: ./D-Lite-chat-service
    env_file: ./D-Lite-chat-service/.env
    environment:
      PORT: ${CHAT_PORT:-4002}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4002/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  call-service:
    build:
      context: ./D-Lite-call-service
    env_file: ./D-Lite-call-service/.env
    environment:
      PORT: ${CALL_PORT:-4003}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-10000}
      RATE_LIMIT_MAX_MESSAGES: ${RATE_LIMIT_MAX_MESSAGES:-60}
      CALL_SESSION_TTL_SECONDS: ${CALL_SESSION_TTL_SECONDS:-3600}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4003/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 5s

  media-service:
    build:
      context: ./D-Lite-media-service
    env_file: ./D-Lite-media-service/.env
    environment:
      PORT: ${MEDIA_PORT:-4004}
      NODE_ENV: ${NODE_ENV:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-d-lite/media}
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4004/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  backup-worker:
    build:
      context: ./D-Lite-backup-worker
    env_file: ./D-Lite-backup-worker/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend-service
      network: host
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://api-gateway:4000}
        NEXT_PUBLIC_CHAT_SOCKET_URL: ${NEXT_PUBLIC_CHAT_SOCKET_URL:-http://chat-service:4002}
        NEXT_PUBLIC_CALL_SOCKET_URL: ${NEXT_PUBLIC_CALL_SOCKET_URL:-http://call-service:4003}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
        NEXT_PUBLIC_ICE_SERVERS_JSON: ${NEXT_PUBLIC_ICE_SERVERS_JSON:-[{"urls":["stun:stun.l.google.com:19302"]}]}
    env_file: ./frontend-service/.env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - public

volumes:
  redis_data:
  mongo_data:

networks:
  public:
  internal:
    internal: true

